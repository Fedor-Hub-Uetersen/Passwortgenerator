<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор паролей</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            /* Неоновый градиентный фон */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            /* Неоновое свечение контейнера */
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .app-logo {
            width: 140px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 25px;
            /* Свечение вокруг лого */
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 22px;
            text-align: center;
            background: #1a1a2e;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
        }
        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 18px;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-generate { 
            background: #00d2ff; 
            color: #0f0c29; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        .btn-generate:hover { box-shadow: 0 0 25px rgba(0, 210, 255, 0.8); }
        .btn-copy { 
            background: transparent; 
            border: 2px solid #00d2ff; 
            color: #00d2ff; 
        }
        .btn-copy:hover { background: #00d2ff; color: #0f0c29; }
    </style>
</head>
<body>

<div class="container">
    <img src="images/logo.png" alt="Logo" class="app-logo">
    <input type="text" id="passwordDisplay" placeholder="PASSWORD" readonly>
    
    <div class="setting">
        <label>Длина (<span id="lengthValue">12</span>):</label>
        <input type="range" id="passwordLength" min="8" max="24" value="12" oninput="document.getElementById('lengthValue').innerText = this.value">
    </div>
    
    <div class="setting">
        <label>Буквы</label>
        <input type="checkbox" id="includeLetters" checked>
    </div>
    
    <div class="setting">
        <label>Цифры</label>
        <input type="checkbox" id="includeDigits" checked>
    </div>
    
    <div class="setting">
        <label>Спецсимволы</label>
        <input type="checkbox" id="includeSpecials" checked>
    </div>

    <button class="btn-generate" onclick="generatePassword()">Сгенерировать</button>
    <button class="btn-copy" onclick="copyToClipboard()">Копировать</button>
</div>

<script>
function generatePassword() {
    const length = document.getElementById('passwordLength').value;
    const includeLetters = document.getElementById('includeLetters').checked;
    const includeDigits = document.getElementById('includeDigits').checked;
    const includeSpecials = document.getElementById('includeSpecials').checked;

    let allCharacters = "";
    if (includeLetters) allCharacters += "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (includeDigits) allCharacters += "0123456789";
    if (includeSpecials) allCharacters += "!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~";

    if (!allCharacters) { alert("Выберите хотя бы один тип символов!"); return; }

    let generatedPassword = "";
    for (let i = 0; i < length; i++) {
        generatedPassword += allCharacters[Math.floor(Math.random() * allCharacters.length)];
    }
    document.getElementById('passwordDisplay').value = generatedPassword;
}

function copyToClipboard() {
    const passwordField = document.getElementById('passwordDisplay');
    if (passwordField.value) {
        navigator.clipboard.writeText(passwordField.value);
        alert("Скопировано!");
    } else {
        alert("Сначала сгенерируйте!");
    }
}
</script>
</body>
</html>
